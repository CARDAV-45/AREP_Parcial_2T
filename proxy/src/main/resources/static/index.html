<!DOCTYPE html>
<html>

<head>
    <title>Form Example</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <h1>lineal</h1>
    <form action="/linearSerch">
        <label for="name">lista:</label><br>
        <input type="text" id="name" name="name" value="[1,2,3]"><br><br>
        <label for="name">search:</label><br>
        <input type="text" id="name" name="name" value="3"><br><br>
        <input type="button" value="Submit" onclick="loadGetMsg()">
    </form>
    <div id="getrespmsg"></div>
    <script>
        function loadGetMsg() {
            let nameVar = document.getElementById("lista").value;
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                document.getElementById("getrespmsg").innerHTML =
                    this.responseText;
            }
            xhttp.open("GET", "/linearSerch?value=" + nameVar);
            xhttp.send();
        }
    </script>
    <h1>binary</h1>
    <form action="/binarySerch">
        <label for="name">lista:</label><br>
        <input type="text" id="name" name="name" value="[1,2,3]"><br><br>
        <label for="name">search:</label><br>
        <input type="text" id="name" name="name" value="3"><br><br>
        <input type="button" value="Submit" onclick="loadGetMsg()">
    </form>
    <div id="postrespmsg"></div>
    <script>
        function loadGetMsg() {
            let nameVar = document.getElementById("name").value;
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                document.getElementById("getrespmsg").innerHTML =
                    this.responseText;
            }
            xhttp.open("GET", "/binarySerch?value=" + nameVar);
            xhttp.send();
        }
    </script>
</body>

</html>
