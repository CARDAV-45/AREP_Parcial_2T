<!DOCTYPE html>
<html>

<head>
    <title>Form Example</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <h1>lineal</h1>
    <input type="text" id="listaLinear" value="1,2,3"><br><br>
    <input type="text" id="searchLinear" value="3"><br><br>
    <input type="button" value="Submit" onclick="loadLinear()">
    <div id="getrespmsg"></div>

    <script>
        function loadLinear() {
            let lista = document.getElementById("listaLinear").value;
            let search = document.getElementById("searchLinear").value;

            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                document.getElementById("getrespmsg").innerHTML = this.responseText;
            }
            xhttp.open("GET", "/linearsearch?array=" + encodeURIComponent(lista) + "&target=" + search);
            xhttp.send();
        }
    </script>

    <h1>binary</h1>
    <input type="text" id="listaBinary" value="1,2,3"><br><br>
    <input type="text" id="searchBinary" value="3"><br><br>
    <input type="button" value="Submit" onclick="loadBinary()">
    <div id="postrespmsg"></div>

    <script>
        function loadBinary() {
            let lista = document.getElementById("listaBinary").value;
            let search = document.getElementById("searchBinary").value;

            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                document.getElementById("postrespmsg").innerHTML = this.responseText;
            }
            xhttp.open("GET", "/binarysearch?array=" + encodeURIComponent(lista) + "&target=" + search);
            xhttp.send();
        }
    </script>
</body>

</html>
